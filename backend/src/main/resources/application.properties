spring.application.name=WishportAPI

#Puerto donde se encenderß el servidor (el camarero)
server.port=8080

#Conexiˇn a la base de datos MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/wishport_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA / Hibernate (Para que Spring entienda SQL)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true