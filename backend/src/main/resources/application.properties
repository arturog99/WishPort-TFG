spring.application.name=WishportAPI


#Valores por defecto donde se encender· el servidor
server.address=0.0.0.0
server.port=8080

#
# CONEXI”N A BASE DE DATOS (AIVEN NUBE)
#
spring.datasource.url=jdbc:mysql://wishport-db-wishportdb.j.aivencloud.com:17432/defaultdb?sslMode=REQUIRED
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.ssl.ca-certificates=classpath:ca.pem

#
# CONFIGURACI”N DE HIBERNATE/JPA
#
# Mantenemos 'validate' porque la base de datos ya la hemos creado nosotros con el script
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ConfiguraciÛn Jackson para fechas ISO UTC
spring.jackson.time-zone=UTC


# Servir archivos est·ticos (ya viene por defecto, pero explÌcito)
spring.web.resources.static-locations=classpath:/static/

# TamaÒo m·ximo de archivos subidos (si usas upload)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
